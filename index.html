<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="FleetFlow — On-demand logistics and delivery for businesses. Same-day courier, freight, and last-mile solutions."
    />
    <meta name="theme-color" content="#0f172a" />
    <meta property="og:title" content="FleetFlow — Logistics Made Simple" />
    <meta
      property="og:description"
      content="On-demand logistics and delivery for businesses. Same-day courier, freight, and last-mile solutions."
    />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap"
      rel="stylesheet"
    />
    <title>FleetFlow — Logistics Made Simple</title>
    <script>
      ;(function () {
        try {
          var theme = localStorage.getItem("fleetflow-theme") || "system"
          var resolved =
            theme === "system"
              ? window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light"
              : theme
          document.documentElement.classList.add(resolved)
          document.documentElement.style.colorScheme = resolved
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
